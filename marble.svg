<svg xmlns="http://www.w3.org/2000/svg" width="900" height="900" viewBox="0 0 900 900">
  <defs>
    <filter id="marble" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.017" numOctaves="6" seed="14" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.70
                0 0 0 0 0.60
                0 0 0 0 0.40
                0 0 0 -1.6 1.05"/>
    </filter>
    <filter id="veins" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.006 0.02" numOctaves="2" seed="7" result="t"/>
      <feColorMatrix in="t" type="matrix"
        values="0 0 0 0 0.64
                0 0 0 0 0.53
                0 0 0 0 0.33
                0 0 0 -2.2 1.2"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#f8f3ec"/>
  <rect width="100%" height="100%" filter="url(#marble)" opacity="0.45"/>
  <rect width="100%" height="100%" filter="url(#veins)" opacity="0.18"/>
</svg>
